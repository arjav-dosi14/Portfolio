{% load static %}
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfolio of Arjav Dosi, Python & Django Developer">
    <title>Arjav Dosi | Software Engineer</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            bg: '#FFFFFF',
                            alt: '#F9FAFB',
                            text: '#1E293B',
                            lightText: '#64748B',
                            primary: '#1D4ED8',
                        }
                    },
                    boxShadow: {
                        'premium': '0 2px 10px -2px rgba(0, 0, 0, 0.02), 0 8px 24px -4px rgba(0, 0, 0, 0.03)',
                        'premium-hover': '0 10px 20px -2px rgba(0, 0, 0, 0.03), 0 20px 40px -4px rgba(0, 0, 0, 0.04)',
                        'button': '0 1px 2px rgba(0, 0, 0, 0.05)',
                    }
                }
            }
        }
    </script>
    
    <!-- External Stylesheet -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="relative selection:bg-gray-100 selection:text-gray-900 flex flex-col min-h-screen bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-blue-50/20 via-white to-white">
    <!-- Scroll Progress Bar -->
    <div id="scroll-progress" class="fixed top-0 left-0 h-1 bg-gradient-to-r from-blue-400 to-blue-700 z-[100]" style="width: 0%; transition: width 0.1s ease-out;"></div>

    <!-- Skip to main content for Accessibility -->
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 z-50 bg-gray-900 text-white px-4 py-2 rounded-md font-semibold focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-gray-900">
        Skip to main content
    </a>

    <!-- Header / Navbar -->
    <header>
        {% include 'components/navbar.html' %}
    </header>

    <!-- Django Messages -->
    {% if messages %}
    <div class="fixed top-24 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 w-full max-w-sm px-4" aria-live="polite">
        {% for message in messages %}
        <div class="bg-white border px-4 py-3 rounded-xl flex items-center gap-3 text-sm shadow-premium {% if message.tags == 'success' %}border-green-100 text-green-700{% else %}border-red-100 text-red-700{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <!-- Main Content -->
    <main id="main-content" class="flex-grow">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    {% include 'components/footer.html' %}

    <!-- GSAP & ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <!-- External JS -->
    <script src="{% static 'js/main.js' %}" defer></script>
</body>
</html>
